app-id: io.github.alliecatowo.glassy
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: glassy

finish-args:
  # Wayland display access (primary; glassy is a Wayland-first app).
  - --socket=wayland
  # X11 fallback via XWayland.
  - --socket=fallback-x11
  - --share=ipc
  # GPU / DRI access for the wgpu renderer.
  - --device=dri
  # Audio for the optional bell (bell-audio feature).
  - --socket=pulseaudio
  # Network: not needed at runtime; disable for sandbox hygiene.
  # PTY / pseudo-terminal access inside the sandbox.
  - --env=TERM=xterm-256color
  # Let the user's shell read its profile (HOME is already available).
  - --filesystem=home

build-options:
  # Pull the Rust toolchain from the SDK extension.
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/glassy/cargo
    RUST_BACKTRACE: "1"

modules:
  - name: glassy
    buildsystem: simple
    build-commands:
      - cargo --offline build --release
      - install -Dm755 target/release/glassy /app/bin/glassy
      # Icons.
      - for sz in 16 32 48 64 128 256 512; do
          install -Dm644 "assets/icons/glassy-${sz}.png"
            "/app/share/icons/hicolor/${sz}x${sz}/apps/io.github.alliecatowo.glassy.png";
        done
      # Desktop entry and appstream metainfo.
      - install -Dm644 packaging/flatpak/io.github.alliecatowo.glassy.desktop
          /app/share/applications/io.github.alliecatowo.glassy.desktop
      - install -Dm644 packaging/flatpak/io.github.alliecatowo.glassy.metainfo.xml
          /app/share/metainfo/io.github.alliecatowo.glassy.metainfo.xml
      # Man page.
      - install -Dm644 extra/glassy.1 /app/share/man/man1/glassy.1

    build-options:
      # Vendor cargo deps offline — run `cargo vendor` before building the
      # Flatpak and add the vendored tree to this source list.
      env:
        CARGO_NET_OFFLINE: "true"

    sources:
      - type: git
        url: https://github.com/alliecatowo/glassy.git
        tag: v0.1.0
        commit: PLACEHOLDER_COMMIT_HASH
        # TODO: replace commit hash with the actual v0.1.0 tag commit.
      # Cargo vendor snapshot (generated by `cargo vendor`; checked in or
      # fetched by CI).  Replace with a local path during development:
      #   type: dir
      #   path: vendor
      - type: file
        url: https://github.com/alliecatowo/glassy/releases/download/v0.1.0/cargo-vendor.tar.gz
        dest: .
        dest-filename: cargo-vendor.tar.gz
        sha256: PLACEHOLDER_SHA256
        # TODO: CI fills this in; set to a real checksum once the release exists.
