name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: build & publish (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev \
            libasound2-dev \
            libfontconfig-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release
        run: cargo build --release --verbose

      - name: Strip and stage binary
        run: |
          strip target/release/glassy
          cp target/release/glassy glassy-x86_64-linux

      - name: Build .deb package
        run: cargo deb --no-build --output target/debian/glassy_amd64.deb

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            glassy-x86_64-linux
            target/debian/glassy_amd64.deb
          fail_on_unmatched_files: true
