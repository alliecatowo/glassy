<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep indigo glass base, warming toward blue/purple at the bottom -->
    <linearGradient id="tile" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f2236"/>
      <stop offset="0.45" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#15151f"/>
    </linearGradient>

    <!-- Cool blue->purple sheen sweeping across the glass -->
    <linearGradient id="sheen" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.0"/>
      <stop offset="0.78" stop-color="#bb9af7" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#bb9af7" stop-opacity="0.42"/>
    </linearGradient>

    <!-- Soft top highlight (the "glass" reflection) -->
    <linearGradient id="gloss" x1="256" y1="56" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle inner edge light -->
    <linearGradient id="edge" x1="256" y1="64" x2="256" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ab4ff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#bb9af7" stop-opacity="0.30"/>
    </linearGradient>

    <!-- Cyan prompt glow -->
    <linearGradient id="prompt" x1="180" y1="180" x2="340" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dcfff"/>
      <stop offset="1" stop-color="#2ac3de"/>
    </linearGradient>

    <radialGradient id="cornerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
        gradientTransform="translate(120 110) scale(280)">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>

    <filter id="promptShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2ac3de" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#tile)"/>
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#cornerGlow)"/>
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#sheen)"/>
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#gloss)"/>

  <!-- Crisp inner border for the glass edge -->
  <rect x="50.5" y="50.5" width="411" height="411" rx="101.5"
        fill="none" stroke="url(#edge)" stroke-width="3"/>

  <!-- Prompt mark: chevron + cursor underscore -->
  <g filter="url(#promptShadow)">
    <path d="M170 178 L262 256 L170 334"
          fill="none" stroke="url(#prompt)" stroke-width="34"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="288" y="316" width="120" height="30" rx="15" fill="url(#prompt)"/>
  </g>
</svg>
